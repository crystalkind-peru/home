function money(v){return 'S/ '+Number(v||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2})}
function pct(v){return (v===null||v===undefined)?'—':(Number(v)>9000?'Nuevo':Number(v).toFixed(1)+'%')}
function table(rows,cols){return '<div style="overflow:auto"><table><thead><tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+((c[2]?c[2](r[c[1]],r):r[c[1]])??'')+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'}

sec('inicio',`<div class="eyebrow">CrystalKind · lectura comercial</div><h1>Panel maestro fusionado · OKR/KPI: estrategia, ventas, BCG y benchmarking</h1><p class="lead">Esta versión fusiona el HTML estratégico anterior con el nuevo módulo de ventas: áreas, comunicación, canales, productos top, BCG por piedra/categoría/subcategoría, benchmarking y decisiones comerciales en un solo panel. La base final queda en Google Sheets, no en JSON.</p>${renderKpis()}<div class="callout" style="margin-top:18px"><b>Lectura central:</b> LIVE sigue siendo el motor comercial con 67.49% de participación, pero la estrategia debe usarlo como generador de confianza y data, no como dependencia única. Sede Dasso debe operar como punto físico prioritario y Web/WhatsApp como cierre asistido.</div><p class="src">Sheets operativo: <a href="${SOL}" target="_blank">Home Gantt CK</a></p>`);

sec('marca',`<div class="eyebrow">Valor de marca</div><h1>Una joya que se siente personal</h1><p class="lead">La comunicación debe pasar de contar una historia repetida a construir valor: intención, estética, asesoría humana, pieza deseable y experiencia coherente entre Dasso, WhatsApp, live, web y CRM.</p><div class="grid g3"><div class="card"><h3>Intención</h3><p>La piedra se comunica desde una emoción concreta: calma, protección, prosperidad, amor propio o regalo.</p></div><div class="card"><h3>Diseño</h3><p>La pieza debe sentirse como joya primero: luz, textura, material, forma y uso real.</p></div><div class="card"><h3>Acompañamiento</h3><p>La asesoría humana diferencia a CK del catálogo frío y de la competencia informal.</p></div></div><div class="callout" style="margin-top:18px"><b>Fórmula:</b> situación emocional + joya concreta + valor percibido + acción.</div>`);
sec('areas',`<div class="eyebrow">Estrategia por área</div><h1>Qué debe hacer cada área, qué no hacer y por qué</h1><p class="lead">Esta sección fusiona la planificación estratégica por áreas con la lectura comercial. Todas las áreas deben hablar el mismo idioma: marca, venta, data y ejecución.</p><div class="grid" style="gap:16px"><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Solange</div><h3>Dirección General</h3><p class='lead'>Definir foco, margen, prioridades y ritmo semanal.</p></div><span class='pill Estrella'>Área 1</span></div><p class='note'><b>Por qué:</b> Evita dispersión y ordena todo el sistema.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>prioridad semanal</li><li>producto foco</li><li>decisiones con fecha</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>abrir campañas sin métrica</li><li>cambiar prioridades sin data</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Solange / Wendy</div><h3>Imagen de Marca</h3><p class='lead'>Hacer deseable la marca sin discurso genérico.</p></div><span class='pill Estrella'>Área 2</span></div><p class='note'><b>Por qué:</b> La clienta compra una sensación personal, no solo una piedra.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>emociones reales</li><li>estética sobria</li><li>confianza humana</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>promesas mágicas</li><li>clichés espirituales</li><li>cambiar estilo sin criterio</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Loren</div><h3>Administración CK</h3><p class='lead'>Registrar acuerdos, evidencias, fechas y bloqueos.</p></div><span class='pill Estrella'>Área 3</span></div><p class='note'><b>Por qué:</b> Sin registro no hay seguimiento operativo.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>orden</li><li>evidencia</li><li>cumplimiento</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>cerrar sin evidencia</li><li>guardar decisiones solo en chats</li><li>mover fechas sin motivo</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Wendy</div><h3>Contenido Orgánico</h3><p class='lead'>Crear deseo y llevar a WhatsApp, Dasso, web o live.</p></div><span class='pill Estrella'>Área 4</span></div><p class='note'><b>Por qué:</b> El contenido abre deseo y ventas debe capturarlo.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>intención</li><li>educación útil</li><li>CTA comercial</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>producto plano</li><li>trend sin marca</li><li>pieza sin CTA</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Jorge</div><h3>Diseño Gráfico</h3><p class='lead'>Elevar percepción de valor con claridad visual.</p></div><span class='pill Estrella'>Área 5</span></div><p class='note'><b>Por qué:</b> La joya se compra primero con los ojos.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>deseabilidad</li><li>lectura rápida</li><li>consistencia</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>saturar diseños</li><li>oscurecer sin sentido</li><li>deformar logo</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Diego</div><h3>Marketing 360</h3><p class='lead'>Coordinar campañas, contenido, CRM, web, pauta y ventas.</p></div><span class='pill Estrella'>Área 6</span></div><p class='note'><b>Por qué:</b> Una clienta puede descubrir en contenido y cerrar en otro canal.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>sistema</li><li>embudo</li><li>coherencia</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>campañas aisladas</li><li>medir solo likes</li><li>cambiar sin data</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Diego</div><h3>Email Marketing / CRM</h3><p class='lead'>Reactivar clientas y aumentar recompra.</p></div><span class='pill Estrella'>Área 7</span></div><p class='note'><b>Por qué:</b> La recompra es más rentable que captar desde cero.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>segmentación</li><li>recompra</li><li>cercanía</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>mensaje masivo único</li><li>descuento permanente</li><li>tono frío</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Yosif</div><h3>Paid Media</h3><p class='lead'>Invertir con medición y creatividad alineada al cierre real.</p></div><span class='pill Estrella'>Área 8</span></div><p class='note'><b>Por qué:</b> La pauta debe seguir venta real, no solo métricas de plataforma.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>UTM</li><li>BCG</li><li>retargeting</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>clic barato</li><li>pautar sin stock</li><li>cambiar sin hipótesis</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Yosif</div><h3>Analítica Comercial / BI</h3><p class='lead'>Convertir ventas en decisiones de producto, canal y stock.</p></div><span class='pill Estrella'>Área 9</span></div><p class='note'><b>Por qué:</b> La data muestra qué escalar, defender o testear.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>venta real</li><li>BCG</li><li>decisión</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>ver solo venta total</li><li>dejar otros sin limpiar</li><li>ignorar crecimiento</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Alejandra / Solange</div><h3>Live Ventas</h3><p class='lead'>Mantener LIVE fuerte, pero hacerlo sistema.</p></div><span class='pill Estrella'>Área 10</span></div><p class='note'><b>Por qué:</b> LIVE concentra 67.49%; debe generar data, no solo venta.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>confianza</li><li>urgencia honesta</li><li>registro</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>improvisar</li><li>no registrar objeciones</li><li>prometer stock sin validar</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Liz</div><h3>Ventas Web / WhatsApp</h3><p class='lead'>Cerrar consultas con asesoría rápida y humana.</p></div><span class='pill Estrella'>Área 11</span></div><p class='note'><b>Por qué:</b> La clienta necesita guía para elegir piedra, talla y set.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>velocidad</li><li>asesoría</li><li>seguimiento</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>responder como catálogo</li><li>dejar sin próximo paso</li><li>prometer disponibilidad sin confirmar</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Diego</div><h3>Key Account / Alianzas</h3><p class='lead'>Abrir colaboraciones que lleven tráfico, contenido y ventas.</p></div><span class='pill Estrella'>Área 12</span></div><p class='note'><b>Por qué:</b> Alianzas correctas dan autoridad y clientas afines.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>afinidad</li><li>experiencia</li><li>retorno</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>alianzas que bajen marca</li><li>regalar sin medir</li><li>eventos sin datos</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Yosif</div><h3>Web / Ecommerce</h3><p class='lead'>Convertir web en vitrina de confianza y puente a cierre asistido.</p></div><span class='pill Estrella'>Área 13</span></div><p class='note'><b>Por qué:</b> La web debe preparar WhatsApp, no competir con él.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>confianza</li><li>CTA claro</li><li>prueba social</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>archivo de productos</li><li>fichas sin historia</li><li>beneficios no vigentes</li></ul></div></div></div><div class='card area-card'><div class='area-head'><div><div class='eyebrow'>Yosif / Loren</div><h3>Omnicanalidad / Procesos</h3><p class='lead'>Unificar lenguaje, responsables, tareas y alertas.</p></div><span class='pill Estrella'>Área 14</span></div><p class='note'><b>Por qué:</b> La estrategia y ejecución deben vivir en un solo sistema.</p><div class='do-grid'><div><h4>Qué hacer</h4><ul class='list ok'><li>modelo de datos</li><li>responsabilidad</li><li>cadencia</li></ul></div><div><h4>Qué no hacer</h4><ul class='list no'><li>duplicar información</li><li>subtareas con varios responsables</li><li>cambios sin historial</li></ul></div></div></div></div>`);
sec('pilares',`<div class="eyebrow">Comunicación común</div><h1>Pilares que todas las áreas deben respetar</h1><div class="grid g3"><div class="card"><h3>1. Emoción real</h3><p>Hablar de momentos concretos de la clienta, no de promesas abstractas.</p></div><div class="card"><h3>2. Valor visible</h3><p>Mostrar material, piedra, detalle, uso, empaque y asesoría.</p></div><div class="card"><h3>3. Cierre asistido</h3><p>Cada mensaje debe llevar a WhatsApp, Dasso, web, live o CRM.</p></div></div><div class="grid g2" style="margin-top:16px"><div class="card do"><h3>Usar</h3><ul><li>“Elige la piedra según lo que estás viviendo.”</li><li>“Ven a probarla en Dasso y encuentra la que se siente tuya.”</li><li>“Una pieza para volver a ti.”</li></ul></div><div class="card dont"><h3>Evitar</h3><ul><li>Promesas mágicas o curativas.</li><li>Frases automáticas o clichés espirituales.</li><li>Mensajes de descuento sin construcción de valor.</li></ul></div></div>`);
sec('canales',`<div class="eyebrow">Canales y embudo</div><h1>Todo canal debe tener una función de venta</h1><p class="lead">La meta no es apagar LIVE, sino hacer que LIVE, Dasso, WhatsApp, web, paid media y CRM se alimenten entre sí.</p><div class="grid g3"><div class="card"><h3>LIVE</h3><p>Motor actual. Debe registrar productos, objeciones y cierres.</p></div><div class="card"><h3>Sede Dasso</h3><p>Punto físico prioritario. Activar citas, prueba de piezas y experiencia sensorial.</p></div><div class="card"><h3>WhatsApp</h3><p>Asesoría y cierre asistido por intención, talla, set y objeción.</p></div><div class="card"><h3>Web</h3><p>Vitrina de confianza: ficha, piedra, guía, reseña y CTA.</p></div><div class="card"><h3>Paid Media</h3><p>Debe seguir BCG: escalar, sostener, testear o depurar.</p></div><div class="card"><h3>CRM</h3><p>Recompra por piedra, categoría, intención y fecha de última compra.</p></div></div>`);
sec('ventas',`<div class="eyebrow">Pestaña independiente</div><h1>Ventas</h1><p class="lead">Subpestañas para leer ventas por resumen, meses, canales y decisiones comerciales.</p><div class="tabs"><button class="tab on" onclick="sub('ventas','resumen',this)">Resumen</button><button class="tab" onclick="sub('ventas','meses',this)">Meses</button><button class="tab" onclick="sub('ventas','canales',this)">Canales</button></div><div id="ventas-resumen" class="subpane">${renderKpis()}<div class="card" style="margin-top:18px"><h3>Qué significa</h3><p>El ticket de S/270.63 permite construir bundles realistas: anillo + collar, pulsera + dije o piedra + ritual. No conviene empujar descuento general; conviene construir intención, set y motivo de compra.</p></div></div><div id="ventas-meses" class="subpane" style="display:none">${table(DATA.monthly,[['Mes','mes'],['Venta','venta',money]])}</div><div id="ventas-canales" class="subpane" style="display:none">${table(DATA.channels,[['Canal','nombre'],['Venta','venta',money],['Part.','share',v=>v+'%'],['Crec.','growth_pct',pct],['Docs','docs'],['Top producto','top_producto']])}</div>`);
sec('top',`<div class="eyebrow">Productos más vendidos</div><h1>Top productos</h1><p class="lead">Lista de productos que más aportan a venta neta. Sirve para definir stock, pauta, lives, bundles y páginas destacadas.</p>${table(DATA.top_products,[['Producto','nombre'],['Venta','venta',money],['Unid.','unidades'],['Share','share',v=>v+'%'],['Crec.','growth_pct',pct],['Docs','docs'],['Categoría','top_cat']])}`);
function bcgGrid(rows){const qs=['Estrella','Vaca','Interrogante','Perro'];return `<div class="matrix">${qs.map(q=>`<div class="quad"><h3><span class="pill ${q}">${q}</span></h3>${rows.filter(r=>r.cuadrante===q).slice(0,8).map(r=>`<div class="item"><b>${r.nombre}</b><br>${money(r.venta)} · ${r.share}% · crec. ${pct(r.growth_pct)}<div class="bar"><i style="width:${Math.min(100,r.share*8)}%"></i></div><span class="note">${r.accion}</span></div>`).join('')||'<p class="note">Sin elementos prioritarios.</p>'}</div>`).join('')}</div>`}
sec('bcg-piedras',`<div class="eyebrow">Matriz BCG</div><h1>BCG por piedra</h1><p class="lead">Cruza participación de venta vs crecimiento Ene-Mar / Abr-Jun. No es BCG de mercado externo; es un proxy interno para decidir stock, pauta y contenido.</p>${bcgGrid(DATA.bcg_stones)}<hr><h3>Tabla completa</h3>${table(DATA.bcg_stones,[['Piedra','nombre'],['Venta','venta',money],['Share','share',v=>v+'%'],['Crec.','growth_pct',pct],['Cuadrante','cuadrante',v=>`<span class="pill ${v}">${v}</span>`],['Acción','accion']])}`);
sec('bcg-cats',`<div class="eyebrow">Categorías y subcategorías</div><h1>BCG por categorías</h1><p class="lead">Anillos son estrella; collares, aretes y pulseras son vacas comerciales. La subcategoría Dimensiones aparece como línea estratégica nueva.</p><h3>Categorías</h3>${bcgGrid(DATA.bcg_categories)}<h3 style="margin-top:24px">Subcategorías</h3>${table(DATA.bcg_subcategories,[['Subcategoría','nombre'],['Venta','venta',money],['Share','share',v=>v+'%'],['Crec.','growth_pct',pct],['Cuadrante','cuadrante',v=>`<span class="pill ${v}">${v}</span>`],['Acción','accion']])}`);
sec('bcg-subcats',`<div class="eyebrow">Matriz BCG</div><h1>BCG por subcategorías</h1><p class="lead">Las subcategorías permiten separar líneas como Dimensiones, Imperial, Curved Heart, Bolitas y A Pedido para decidir cuál merece campaña propia, cuál debe sostenerse y cuál debe depurarse.</p>${table(DATA.bcg_subcategories,[['Subcategoría','nombre'],['Venta','venta',money],['Share','share',v=>v+'%'],['Crec.','growth_pct',pct],['Cuadrante','cuadrante',v=>`<span class="pill ${v}">${v}</span>`],['Acción','accion']])}`);
sec('estrategia-ventas',`<div class="eyebrow">Decisiones desde la data</div><h1>Estrategia comercial derivada de ventas</h1><p class="lead">No es una lista genérica: cada decisión sale de una lectura de ventas, canal, producto, piedra o categoría.</p>${table(VEST.map(x=>({frente:x[0],lectura:x[1],decision:x[2],accion:x[3]})),[['Frente','frente'],['Lectura','lectura'],['Decisión','decision'],['Acción concreta','accion']])}`);
sec('benchmark',`<div class="eyebrow">Benchmarking estratégico</div><h1>Benchmarking desarrollado</h1><p class="lead">El benchmark deja de ser “mirar marcas” y pasa a traducirse en decisiones de portafolio, precio, contenido, canal y experiencia.</p>${table(BENCH,[['Bloque','bloque'],['Referente','referente'],['Lectura estratégica','lectura'],['Qué hace el mercado','mercado'],['Qué debe hacer CK','hacer'],['Qué no debe hacer','no'],['Aplicación en ventas','ventas']])}<div class="callout" style="margin-top:18px"><b>Fuentes externas usadas:</b> CrystalKind web oficial e Ilaria web oficial. Las decisiones internas cruzan esas señales con las ventas reales del reporte CK.</div>`);
sec('acciones',`<div class="eyebrow">Reglas operativas</div><h1>Qué hacer y qué no hacer</h1><div class="grid g2"><div class="card do"><h3>Hacer</h3><ul><li>Usar LIVE para generar confianza, pero registrar datos y derivar a WhatsApp/Web.</li><li>Priorizar Sede Dasso como experiencia física premium.</li><li>Escalar anillos Dimensiones, Cuarzo Rosa, Ojo de Tigre y pruebas controladas con Citrino/Fluorita.</li><li>Crear bundles por intención: amor propio, protección, prosperidad, calma.</li><li>Normalizar categoría, subcategoría, piedra, colección y canal en cada registro.</li></ul></div><div class="card dont"><h3>No hacer</h3><ul><li>No comunicar canales que no estén activos.</li><li>No usar beneficios logísticos como eje central de la estrategia.</li><li>No descontar piezas héroe sin motivo táctico.</li><li>No diseñar contenido por gusto interno si la data de ventas dice otra cosa.</li><li>No tratar Dasso como solo punto de recojo.</li></ul></div></div>`);
sec('personas',`<div class="eyebrow">Personas y funciones</div><h1>Una persona puede tener varias funciones</h1><p class="lead">La tarea puede tener varios responsables, pero cada subtarea debe tener un responsable único para mantener trazabilidad.</p><div class="grid g4"><div class='card'><h3>Solange</h3><p class='note'>CEO / Imagen de Marca / Live Ventas</p></div><div class='card'><h3>Loren</h3><p class='note'>Asistente Administrativa CK</p></div><div class='card'><h3>Wendy</h3><p class='note'>Jefa de Contenido / Imagen de Marca</p></div><div class='card'><h3>Jorge</h3><p class='note'>Diseñador Gráfico</p></div><div class='card'><h3>Diego</h3><p class='note'>Jefe de Marketing / Email Marketing / Key Account</p></div><div class='card'><h3>Alejandra</h3><p class='note'>Live Ventas</p></div><div class='card'><h3>Liz</h3><p class='note'>Ventas Web</p></div><div class='card'><h3>Yosif</h3><p class='note'>Marketing 360 / Paid Media / Analista Comercial</p></div></div>`);
sec('gantt',`<div class="eyebrow">Gantt por persona</div><h1>Carga operativa y prioridades</h1><p class="lead">Vista resumida del desarrollo fusionado. El Gantt detallado vive en el Sheets; esta vista sirve como mapa ejecutivo.</p><div style="overflow:auto"><div class="gantt-mini"><div class="gh" style="grid-column:1">Tarea</div><div class="gh">1</div><div class="gh">2</div><div class="gh">3</div><div class="gh">4</div><div class="gh">5</div><div class="gh">6</div><div class="gh">7</div><div class="gh">8</div><div class="gh">9</div><div class="gh">10</div><div class="gh">11</div><div class="gh">12</div><div class="gh">13</div><div class="gh">14</div><div class="gh">15</div><div class="gh">16</div><div class="gh">17</div><div class="gh">18</div><div class="gh">19</div><div class="gh">20</div><div class="gh">21</div><div class="gh">22</div><div class="gh">23</div><div class="gh">24</div><div class="gh">25</div><div class="gh">26</div><div class="gh">27</div><div class="gh">28</div><div class="gh">29</div><div class="gh">30</div><div class="gh">31</div><div class="gh">32</div><div class="gh">33</div><div class="gh">34</div><div class="gh">35</div><div class="gh">36</div><div class="gh">37</div><div class="gh">38</div><div class="gh">39</div><div class="gh">40</div><div class="gh">41</div><div class="gh">42</div><div class="gh">43</div><div class="gh">44</div><div class="gh">45</div><div class="gl" style="grid-row:2;grid-column:1">Visión CK<br><span class="note">Solange/Yosif</span></div><div class="gbar" style="grid-row:2;grid-column:2/4;background:var(--terr)">1-2</div><div class="gl" style="grid-row:3;grid-column:1">Contenido 45 días<br><span class="note">Wendy/Jorge/Diego</span></div><div class="gbar" style="grid-row:3;grid-column:2/7;background:var(--oro)">1-5</div><div class="gl" style="grid-row:4;grid-column:1">Sistema visual<br><span class="note">Jorge</span></div><div class="gbar" style="grid-row:4;grid-column:2/7;background:var(--oro2)">1-5</div><div class="gl sec('okrs',`<div class="eyebrow">Gestión por resultados</div><h1>OKR y KPI por persona y función</h1><p class="lead">Cada persona puede tener varias funciones, por eso los OKR y KPI están asignados por cargo operativo. Cada KPI tiene tres niveles de lectura: <b>mínimo</b>, <b>estable</b> y <b>excelente</b>. Los OKR no se plantean como frases aisladas: cada uno está conectado a un KPI medible, una fuente del Sheets y una frecuencia de control.</p><div class="grid g4"><div class='card'><h3>Solange</h3><p class='note'>CEO / Imagen de Marca / Live Ventas</p><p>Decisión, coherencia de marca y participación estratégica en lives.</p><div class='pill'>KPI foco: Avance general del plan</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>75%</td><td>90%</td><td>100%</td></tr></table></div><div class='card'><h3>Loren</h3><p class='note'>Asistente Administrativa CK</p><p>Trazabilidad, acuerdos, evidencias y bloqueos.</p><div class='pill'>KPI foco: Actualizaciones registradas</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>80%</td><td>90%</td><td>100%</td></tr></table></div><div class='card'><h3>Wendy</h3><p class='note'>Jefa de Contenido / Imagen de Marca</p><p>Contenido que genere demanda y cuide el tono humano de la marca.</p><div class='pill'>KPI foco: Consultas generadas por contenido</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>60</td><td>100</td><td>150</td></tr></table></div><div class='card'><h3>Jorge</h3><p class='note'>Diseñador Gráfico</p><p>Sistema visual consistente, rápido y reusable.</p><div class='pill'>KPI foco: Entregables visuales a tiempo</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>80%</td><td>90%</td><td>97%</td></tr></table></div><div class='card'><h3>Diego</h3><p class='note'>Jefe Marketing / Email / Key Account</p><p>Orquestar campañas, CRM y alianzas para reducir dependencia del LIVE.</p><div class='pill'>KPI foco: Participación venta fuera de LIVE</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>25%</td><td>35%</td><td>45%</td></tr></table></div><div class='card'><h3>Alejandra</h3><p class='note'>Live Ventas</p><p>Lives con venta, registro y aprendizaje, sin sobrecargar la operación.</p><div class='pill'>KPI foco: Venta atribuida a LIVE</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>S/ 8,000</td><td>S/ 15,000</td><td>S/ 22,000</td></tr></table></div><div class='card'><h3>Liz</h3><p class='note'>Ventas Web</p><p>Velocidad, seguimiento y cierre digital por WhatsApp/Web.</p><div class='pill'>KPI foco: Tiempo de primera respuesta</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>60 min</td><td>30 min</td><td>15 min</td></tr></table></div><div class='card'><h3>Yosif</h3><p class='note'>Marketing 360 / Paid Media / BI Comercial</p><p>Conectar data, pauta, ventas, BCG y panel de decisiones.</p><div class='pill'>KPI foco: ROAS asistido</div><table style='margin-top:10px'><tr><th>Mínimo</th><th>Estable</th><th>Excelente</th></tr><tr><td>2.0x</td><td>3.5x</td><td>5.0x</td></tr></table></div></div><div class="card" style="margin-top:18px"><div class="eyebrow">Matriz operativa</div><h3>OKR + KPI asignados</h3><p class="note">La versión completa está en el Sheets, pestañas 24, 25 y 26. Esta vista resume las métricas críticas para gestión semanal y mensual.</p><div style="overflow:auto"><table><thead><tr><th>Persona / función</th><th>Objetivo OKR</th><th>KPI</th><th>Mínimo</th><th>Estable</th><th>Excelente</th><th>Frecuencia</th><th>Área</th></tr></thead><tbody><tr><td><b>Solange</b><br><span class='note'>CEO</span></td><td>Alinear visión, marca y decisiones críticas</td><td>Avance general del plan</td><td>75%</td><td>90%</td><td>100%</td><td>Semanal</td><td>Dirección</td></tr><tr><td><b>Solange</b><br><span class='note'>Imagen de Marca</span></td><td>Elevar percepción de marca sin perder humanidad</td><td>Coherencia de marca</td><td>80%</td><td>90%</td><td>97%</td><td>Semanal</td><td>Marca</td></tr><tr><td><b>Solange</b><br><span class='note'>Live Ventas</span></td><td>Participar solo en lives estratégicos con mayor impacto</td><td>Venta por live estratégico</td><td>S/ 8,000</td><td>S/ 12,000</td><td>S/ 18,000</td><td>Por live</td><td>LIVE</td></tr><tr><td><b>Loren</b><br><span class='note'>Asistente Administrativa CK</span></td><td>Ordenar gestión, acuerdos y evidencias</td><td>Actualizaciones registradas</td><td>80%</td><td>90%</td><td>100%</td><td>Semanal</td><td>Gestión</td></tr><tr><td><b>Loren</b><br><span class='note'>Asistente Administrativa CK</span></td><td>Reducir bloqueos por falta de coordinación</td><td>Bloqueos cerrados</td><td>70%</td><td>85%</td><td>95%</td><td>Semanal</td><td>Gestión</td></tr><tr><td><b>Wendy</b><br><span class='note'>Jefa de Contenido</span></td><td>Convertir contenido en demanda medible</td><td>Consultas generadas por contenido</td><td>60</td><td>100</td><td>150</td><td>Semanal</td><td>Contenido</td></tr><tr><td><b>Wendy</b><br><span class='note'>Imagen de Marca</span></td><td>Aterrizar valor de marca en contenido</td><td>Contenido alineado a marca</td><td>85%</td><td>92%</td><td>98%</td><td>Semanal</td><td>Marca</td></tr><tr><td><b>Jorge</b><br><span class='note'>Diseñador Gráfico</span></td><td>Elevar percepción visual y acelerar producción</td><td>Entregables visuales a tiempo</td><td>80%</td><td>90%</td><td>97%</td><td>Semanal</td><td>Diseño</td></tr><tr><td><b>Jorge</b><br><span class='note'>Diseñador Gráfico</span></td><td>Crear sistema reutilizable de piezas</td><td>Plantillas reutilizables activas</td><td>6</td><td>10</td><td>15</td><td>Mensual</td><td>Diseño</td></tr><tr><td><b>Diego</b><br><span class='note'>Jefe de Marketing</span></td><td>Orquestar campañas, canales y calendario</td><td>Campañas activas según calendario</td><td>80%</td><td>90%</td><td>100%</td><td>Semanal</td><td>Marketing</td></tr><tr><td><b>Diego</b><br><span class='note'>Email Marketing</span></td><td>Activar la base con recompra y seguimiento</td><td>Open rate email</td><td>25%</td><td>35%</td><td>45%</td><td>Por envío</td><td>CRM</td></tr><tr><td><b>Diego</b><br><span class='note'>Key Account</span></td><td>Abrir oportunidades comerciales alineadas a marca</td><td>Reuniones Key Account</td><td>2</td><td>4</td><td>6</td><td>Mensual</td><td>Alianzas</td></tr><tr><td><b>Alejandra</b><br><span class='note'>Live Ventas</span></td><td>Ejecutar lives ordenados y registrables</td><td>Venta atribuida a LIVE</td><td>S/ 8,000</td><td>S/ 15,000</td><td>S/ 22,000</td><td>Semanal</td><td>LIVE</td></tr><tr><td><b>Alejandra</b><br><span class='note'>Live Ventas</span></td><td>Documentar aprendizajes de cada live</td><td>Registro post-live completo</td><td>80%</td><td>90%</td><td>100%</td><td>Por live</td><td>LIVE</td></tr><tr><td><b>Liz</b><br><span class='note'>Ventas Web</span></td><td>Cerrar consultas digitales con trazabilidad</td><td>Tiempo de primera respuesta</td><td>60 min</td><td>30 min</td><td>15 min</td><td>Diario</td><td>Ventas Web</td></tr><tr><td><b>Liz</b><br><span class='note'>Ventas Web</span></td><td>Dar seguimiento a oportunidades abiertas</td><td>Seguimiento completo</td><td>70%</td><td>85%</td><td>95%</td><td>Semanal</td><td>Ventas Web</td></tr><tr><td><b>Yosif</b><br><span class='note'>Marketing 360</span></td><td>Convertir operación en sistema omnicanal medible</td><td>Dashboard actualizado</td><td>90%</td><td>95%</td><td>100%</td><td>Semanal</td><td>BI</td></tr><tr><td><b>Yosif</b><br><span class='note'>Paid Media</span></td><td>Optimizar pauta con medición real</td><td>ROAS asistido</td><td>2.0x</td><td>3.5x</td><td>5.0x</td><td>Semanal</td><td>Paid Media</td></tr><tr><td><b>Yosif</b><br><span class='note'>Analista Comercial</span></td><td>Usar ventas reales para decidir producto y canal</td><td>Ventas clasificadas correctamente</td><td>80%</td><td>90%</td><td>98%</td><td>Semanal</td><td>BI</td></tr><tr><td><b>Yosif</b><br><span class='note'>Analista Comercial</span></td><td>Subir ticket promedio con bundles y cross-sell</td><td>Ticket promedio</td><td>S/ 270</td><td>S/ 300</td><td>S/ 340</td><td>Mensual</td><td>Comercial</td></tr></tbody></table></div></div><div class="callout" style="margin-top:18px"><b>Regla de coherencia:</b> si una tarea tiene varias personas, la responsabilidad se reparte en <b>14_ASIGNACIONES_TAREA</b>. Si es subtarea, solo debe tener una persona responsable. Los KPI miden resultados por función, no solo actividad.</div>`);
sec('conexion',`<div class="eyebrow">Conexión Sheets</div><h1>Arquitectura correcta</h1><p class="lead">Google Sheets es la base central. El HTML visualiza la información. Para editar desde el HTML y guardar cambios en Sheets se necesita Apps Script.</p><div class="sourcebar"><span>Sheets operativo: <a href="${SOL}" target="_blank">Home Gantt CK</a></span><span>Fuente: ventas + estrategia + BCG + benchmark</span><span>Sin JSON como base final</span></div><div class="callout">Cuando agregues nuevas pestañas al Sheets, vuelve a publicar todo el documento para que el HTML público pueda leerlas.</div>`);
const nav=document.getElementById('nav');NAV.forEach(([l,id])=>{if(!id) nav.insertAdjacentHTML('beforeend',`<div class="grp">${l}</div>`); else nav.insertAdjacentHTML('beforeend',`<button onclick="go('${id}')" data-id="${id}">◆ ${l}</button>`)});
function go(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));document.getElementById(id).classList.add('show');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.id===id));document.getElementById('crumb').textContent=(NAV.find(n=>n[1]===id)||[''])[0];scrollTo(0,0)}
function sub(base,id,btn){document.querySelectorAll(`#${base} .tab`).forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.querySelectorAll(`#${base} .subpane`).forEach(p=>p.style.display='none');document.getElementById(`${base}-${id}`).style.display='block'}
go('inicio');
</script></body></html>
