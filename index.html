<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --hueso:#FAF6EE; --hueso2:#F4EDDF; --beige:#EFE4D0; --beige2:#E6D7BD; --linea:#E0D2B8;
  --oro:#B0894E; --oro-osc:#8F6C36; --oro-cla:#C9A86A; --oro-pal:#E7D6B2;
  --marron:#4A3A26; --marron2:#7A6A52; --blanco:#FFFFFF;
  --ahora:#B5764F; --ahora-bg:#F6E7DA; --prop:#6F7E54; --prop-bg:#E8EBDD;
  --sombra:0 12px 34px -18px rgba(74,58,38,.34); --sombra-s:0 4px 14px -8px rgba(74,58,38,.3);
  --rad:16px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--hueso);color:var(--marron);font-family:'Jost',system-ui,sans-serif;font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.08;margin:0;color:var(--marron)}
p{margin:0 0 .7em}
a{color:var(--oro-osc)}
.eyebrow{font-family:'Jost';font-weight:600;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--oro);margin-bottom:10px}
.facet{color:var(--oro-cla)}
/* layout */
.app{display:flex;min-height:100vh}
.side{width:262px;flex:none;background:linear-gradient(180deg,#fff, #FBF7EF);border-right:1px solid var(--linea);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:30}
.brandbar{padding:22px 20px 14px;border-bottom:1px solid var(--linea);text-align:center}
.brandbar img{max-width:170px;width:80%;height:auto;display:block;margin:0 auto 6px}
.brandbar .sub{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--marron2)}
.nav{padding:12px 12px 18px;flex:1}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:transparent;color:var(--marron2);font-family:'Jost';font-size:13.5px;font-weight:500;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.18s;margin-bottom:2px}
.nav button:hover{background:var(--hueso2);color:var(--marron)}
.nav button.on{background:var(--marron);color:#F6ECD8}
.nav button.on .dot{background:var(--oro-cla)}
.nav .dot{width:7px;height:7px;border-radius:2px;transform:rotate(45deg);background:var(--beige2);flex:none}
.nav .grp{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--oro);padding:14px 12px 6px;font-weight:600}
.main{flex:1;min-width:0}
.topbar{position:sticky;top:0;display:flex;align-items:center;gap:10px;justify-content:flex-end;padding:12px 26px;background:rgba(250,246,238,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--linea);z-index:25}
.topbar .crumb{margin-right:auto;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--marron2)}
.btn{font-family:'Jost';font-weight:500;font-size:13px;border:1px solid var(--linea);background:var(--blanco);color:var(--marron);padding:9px 15px;border-radius:30px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{border-color:var(--oro);box-shadow:var(--sombra-s)}
.btn.solid{background:var(--marron);color:#F6ECD8;border-color:var(--marron)}
.btn.solid:hover{background:#5b4830}
.btn.gold{background:var(--oro);color:#fff;border-color:var(--oro)}
.btn.gold:hover{background:var(--oro-osc)}
.btn.on{background:var(--prop);color:#fff;border-color:var(--prop)}
.badge{background:var(--oro);color:#fff;border-radius:20px;font-size:11px;padding:1px 8px;font-weight:600}
.wrap{max-width:1080px;margin:0 auto;padding:34px 26px 90px}
/* sections */
.section{display:none;animation:fade .4s ease}
.section.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hdr{margin-bottom:22px}
.hdr h1{font-size:clamp(30px,4.4vw,46px)}
.hdr h2{font-size:clamp(25px,3.4vw,36px)}
.lead{font-size:16.5px;color:var(--marron2);max-width:70ch}
.card{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--rad);padding:22px;box-shadow:var(--sombra-s)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}
/* kpi */
.kpi{background:linear-gradient(160deg,#fff,#FBF6EC);border:1px solid var(--linea);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.kpi:before{content:"❖";position:absolute;right:10px;top:6px;color:var(--oro-pal);font-size:26px}
.kpi .n{font-family:'Cormorant Garamond';font-size:34px;font-weight:700;color:var(--oro-osc);line-height:1}
.kpi .l{font-size:12.5px;color:var(--marron2);margin-top:4px}
/* toggle actual/propuesta */
.switch{display:inline-flex;background:var(--hueso2);border:1px solid var(--linea);border-radius:30px;padding:4px;gap:4px;margin:6px 0 18px}
.switch button{border:0;background:transparent;font-family:'Jost';font-weight:600;font-size:12.5px;letter-spacing:.04em;padding:8px 16px;border-radius:30px;cursor:pointer;color:var(--marron2)}
.switch button.on[data-v="ahora"]{background:var(--ahora);color:#fff}
.switch button.on[data-v="prop"]{background:var(--prop);color:#fff}
.pane{display:none}.pane.show{display:block;animation:fade .35s}
.tag{display:inline-block;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.tag.a{background:var(--ahora-bg);color:#9a5a32}
.tag.p{background:var(--prop-bg);color:#54613c}
.list{list-style:none;padding:0;margin:0}
.list li{padding:9px 0 9px 26px;position:relative;border-bottom:1px dashed var(--linea);font-size:14.5px}
.list li:last-child{border-bottom:0}
.list li:before{content:"◆";position:absolute;left:4px;top:9px;color:var(--oro-cla);font-size:10px}
.list.x li:before{content:"✕";color:var(--ahora)}
.list.ok li:before{content:"✓";color:var(--prop)}
/* chips / tabs */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 18px}
.chip{border:1px solid var(--linea);background:#fff;border-radius:30px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:.16s;color:var(--marron2)}
.chip:hover{border-color:var(--oro)}
.chip.on{background:var(--marron);color:#F6ECD8;border-color:var(--marron)}
/* table */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--linea)}
th{font-family:'Jost';font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--marron2);background:var(--hueso2)}
tr:hover td{background:#FCF9F2}
.pill{font-weight:600;color:var(--oro-osc)}
/* product cards */
.prod{background:#fff;border:1px solid var(--linea);border-radius:14px;overflow:hidden;text-align:center;transition:.2s}
.prod:hover{transform:translateY(-4px);box-shadow:var(--sombra)}
.prod .ph{aspect-ratio:1;background:var(--hueso2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.prod .ph img{width:100%;height:100%;object-fit:cover}
.prod .ph .fb{font-size:40px;color:var(--oro-pal)}
.prod .b{padding:12px}
.prod .b .nm{font-size:13px;font-weight:600;min-height:34px}
.prod .b .pr{color:var(--oro-osc);font-weight:600;margin-top:3px}
/* meta ads bar */
.bar{height:30px;border-radius:8px;display:flex;overflow:hidden;border:1px solid var(--linea);margin:6px 0 16px}
.bar span{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:.18s}
/* checklist */
.phase{border:1px solid var(--linea);border-radius:14px;overflow:hidden;margin-bottom:16px;background:#fff}
.phase>.h{display:flex;align-items:center;gap:12px;padding:15px 18px;background:var(--hueso2);cursor:pointer}
.phase>.h .num{font-family:'Cormorant Garamond';font-size:30px;font-weight:700;color:var(--oro);line-height:1}
.phase>.h h3{font-size:21px}
.phase>.h .meta{margin-left:auto;font-size:12px;color:var(--marron2)}
.tasks{padding:6px 18px 14px}
.task{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--linea)}
.task:last-child{border-bottom:0}
.task input{margin-top:3px;width:18px;height:18px;accent-color:var(--oro);flex:none;cursor:pointer}
.task .t{font-size:14px}
.task.done .t{text-decoration:line-through;color:var(--marron2);opacity:.7}
.task .ch{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--oro-osc);background:var(--oro-pal);border-radius:20px;padding:2px 9px;margin-left:6px}
.prog{height:9px;background:var(--hueso2);border-radius:20px;overflow:hidden;margin:4px 0 0}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--oro-cla),var(--oro));width:0;transition:.4s}
/* foda */
.foda{cursor:pointer;border-left:4px solid var(--oro)}
.foda h4{font-size:20px;margin-bottom:4px}
.foda .more{display:none;margin-top:10px}
.foda.open .more{display:block;animation:fade .3s}
.foda .hint{font-size:11px;color:var(--oro);letter-spacing:.1em;text-transform:uppercase}
/* edit mode */
body.editing .editable{outline:1.5px dashed var(--oro-cla);outline-offset:3px;border-radius:4px;cursor:text;transition:.15s}
body.editing .editable:hover{background:#FFFBF0}
body.editing .editable:focus{outline:2px solid var(--oro);background:#FFFBF0}
.editnote{display:none;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--marron);color:#F6ECD8;padding:10px 20px;border-radius:30px;font-size:13px;z-index:60;box-shadow:var(--sombra)}
body.editing .editnote{display:block;animation:fade .3s}
.callout{background:linear-gradient(150deg,#FBF4E6,#F4E7CC);border:1px solid var(--beige2);border-radius:14px;padding:18px 20px}
.callout .eyebrow{margin-bottom:6px}
.note{font-size:12.5px;color:var(--marron2);font-style:italic}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.split{grid-template-columns:1fr}}
.mini{font-size:12px;color:var(--marron2)}
/* mobile nav */
.mtoggle{display:none}
@media(max-width:860px){
  .side{position:fixed;left:-280px;transition:.25s;box-shadow:var(--sombra)}
  .side.open{left:0}
  .mtoggle{display:inline-flex}
  .wrap{padding:24px 16px 80px}
}
.scrim{display:none;position:fixed;inset:0;background:rgba(74,58,38,.4);z-index:28}
.scrim.on{display:block}
hr.div{border:0;border-top:1px solid var(--linea);margin:26px 0}
.severity{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.sev-alta{background:#F6DAD0;color:#9a3a22}.sev-media{background:#F6E7CB;color:#8a6a22}.sev-baja{background:#E2EBD6;color:#566b3a}

/* GANTT STYLES 45 DÍAS */
.gantt-container { overflow-x: auto; margin-bottom: 24px; background: #fff; border: 1px solid var(--linea); border-radius: 14px; padding: 16px; box-shadow: var(--sombra-s);}
.gantt { display: grid; grid-template-columns: 160px repeat(45, minmax(22px, 1fr)); gap: 4px; font-size: 11px; }
.gantt-hdr { font-family: 'Jost'; font-weight: 600; text-align: center; color: var(--marron2); padding-bottom: 6px; padding-top: 6px;}
.gantt-hdr-first { text-align: left; align-self: center;}
.gantt-phase { display:flex; align-items:center; justify-content:center; font-weight: 700; color: var(--marron); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--linea); border-right: 1px solid var(--linea); padding: 4px; }
.gantt-phase:last-child { border-right: none;}
.gantt-row-lbl { font-family: 'Jost'; font-weight: 600; padding-right: 12px; align-self: center; color: var(--marron); font-size: 12px; border-right: 1px solid var(--linea); line-height: 1.2;}
.gantt-bar { border-radius: 6px; color: #fff; text-align: center; font-size: 10px; font-weight: 600; padding: 5px 4px; display:flex; align-items:center; justify-content:center; white-space:nowrap; overflow:hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); margin-top: 2px; margin-bottom: 2px; cursor: pointer; transition: transform 0.15s;}
.gantt-bar:hover { transform: scale(1.02); filter: brightness(1.1); }
</style>
</head>

// Phase Headers

// Days Headers
for(let i=1; i<=45; i++) {
    ganttHtml += `<div class="gantt-hdr" style="grid-row: 2; grid-column: ${i+1}; border-bottom:1px solid var(--linea); border-right:1px solid var(--hueso2);">${i}</div>`;
}

// Tasks Rows
let row = 3;
GANTT_TASKS.forEach(t => {
    ganttHtml += `<div class="gantt-row-lbl" style="grid-row: ${row}; grid-column: 1">${t.lbl}</div>`;
    // El column en CSS Grid empieza en 1. Nuestro día 1 es la columna 2. Entonces start+1. El end es exclusivo en grid-column, entonces end+2.
    ganttHtml += `<div class="gantt-bar" style="grid-row: ${row}; grid-column: ${t.start + 1} / ${t.end + 2}; background: ${t.col}" title="Días ${t.start}-${t.end}">${t.start}-${t.end}</div>`;

});
ganttHtml += '</div></div>';

     <li class="editable">Invitar al showroom desde el LIVE: “ven a sentir tu pieza”.</li>
   </ul></div>
 </div>
 <div class="callout" style="margin-top:16px"><div class="eyebrow">Posicionamiento</div><p class="editable" style="margin:0">Convertir el showroom en el “templo” físico de la marca: el lugar donde la experiencia espiritual se vuelve tangible. Eso sube ticket, fideliza y diferencia de cualquier competidor solo-online.</p></div>
`);

/* VENTAS */
sec('ventas',`
 <div class="hdr"><div class="eyebrow">Sin capacitadora · guía lista para usar</div><h1 class="editable">Proceso de ventas · 3 propuestas</h1>
 <p class="lead editable">Tres métodos que las vendedoras pueden seguir según el tipo de clienta. Primero elige el método; abajo, elige el tipo de clienta y verás el enfoque, qué evitar y cómo manejar objeciones.</p></div>
 <div class="chips" id="methodChips"></div>
 <div class="card" id="methodDetail" style="margin-bottom:18px"></div>
 <div class="eyebrow">Según el tipo de clienta</div>
 <div class="chips" id="clientChips"></div>
 <div class="card" id="clientDetail"></div>
`);

/* PLAN (GANTT 45 DÍAS) */
sec('plan',`
 <div class="hdr"><div class="eyebrow">Plan de Acción & Monitoreo 360°</div><h1 class="editable">Diagrama de Gantt · 45 Días</h1>
 <p class="lead editable">Visión cronológica del desarrollo omnicanal. Desliza a la derecha para ver cómo todas las estrategias (UX, Ads, Comercial, Showroom) se interconectan en las 3 fases a lo largo de los 45 días.</p></div>

 <!-- GANTT VISUAL DINÁMICO 45 DÍAS -->
 ${ganttHtml}

 <div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center"><b>Progreso General del Plan</b><span id="progTxt" class="pill">0%</span></div><div class="prog"><i id="progBar"></i></div></div>
 <div id="phases"></div>
`);

/* HISTORIAL */
sec('historial',`
 <div class="hdr"><div class="eyebrow">Trazabilidad</div><h1>Historial de ediciones</h1>
 <p class="lead">Cada cambio de texto que hagas con el modo edición queda registrado aquí con su antes, después y hora. Se conserva durante esta sesión.</p></div>
 <div class="card"><div style="display:flex;gap:10px;margin-bottom:10px">
   <button class="btn" onclick="toggleEdit()">✎ Activar/desactivar edición</button>
   <button class="btn" onclick="clearHist()">Vaciar historial</button>
 </div>
 <div id="histTable"><p class="mini">Aún no hay ediciones. Activa “Editar textos”, cambia cualquier texto resaltado y volverá aquí.</p></div></div>
`);

/* ---- fill dynamic ---- */
// productos
document.getElementById('prodGrid').innerHTML=PRODUCTS.map(p=>`
 <a class="prod" href="${p.link}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">
  <div class="ph">${p.img?`<img src="${p.img}" alt="${p.nm}" onerror="this.parentNode.innerHTML='<span class=\\'fb\\'>❖</span>'">`:`<span class="fb">❖</span>`}</div>
  <div class="b"><div class="nm editable">${p.nm}</div><div class="pr editable">${p.pr}</div></div>
 </a>`).join('');
// foda
document.getElementById('fodaGrid').innerHTML=FODA.map((f,i)=>`
 <div class="card foda" onclick="this.classList.toggle('open')" style="border-left-color:${f.c}">
   <div style="display:flex;justify-content:space-between;align-items:center"><h4 class="editable" style="color:${f.c}">${f.t}</h4><span class="hint">ver +</span></div>
   <div class="more"><ul class="list">${f.items.map(x=>`<li class="editable">${x}</li>`).join('')}</ul></div>
 </div>`).join('');
// pricing
document.getElementById('pricingRows').innerHTML=PRICING.map(r=>`<tr><td><b class="editable">${r.arq}</b></td><td class="editable">${r.marcas}</td><td class="editable">${r.rango}</td><td class="editable">${r.precio}</td><td class="editable">${r.voz}</td></tr>`).join('');
// web issues
document.getElementById('webRows').innerHTML=WEB_ISSUES.map(w=>`
 <div class="task"><div style="flex:1"><b class="editable">${w.t}</b> <span class="severity sev-${w.s}">${w.s}</span><div class="mini editable" style="margin-top:3px">${w.d}</div></div></div>`).join('');
// ads bar + chips
document.getElementById('adsBar').innerHTML=ADS.map((a,i)=>`<span style="flex:${a.pct};background:${a.col}" onclick="adsTab(${i})" title="${a.n}">${a.pct}%</span>`).join('');
document.getElementById('adsChips').innerHTML=ADS.map((a,i)=>`<button class="chip ${i==0?'on':''}" onclick="adsTab(${i},this)">${a.n.split('(')[0]}</button>`).join('');
function adsTab(i,el){document.querySelectorAll('#adsChips .chip').forEach((c,k)=>c.classList.toggle('on',k==i));const a=ADS[i];
 document.getElementById('adsDetail').innerHTML=`<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:baseline"><h3 style="color:${a.col}">${a.n}</h3><div class="pill" style="font-size:20px">S/ ${a.sol.toLocaleString('es-PE')} · ${a.pct}%</div></div><p class="editable" style="margin-top:8px">${a.d}</p><div class="eyebrow" style="margin-top:8px">KPIs Clave</div><p class="mini editable" style="margin:0">${a.kpi}</p>`;}
adsTab(0);
// methods
document.getElementById('methodChips').innerHTML=METHODS.map((m,i)=>`<button class="chip ${i==0?'on':''}" onclick="methodTab(${i},this)">${i+1}. ${m.nom}</button>`).join('');
function methodTab(i,el){document.querySelectorAll('#methodChips .chip').forEach((c,k)=>c.classList.toggle('on',k==i));const m=METHODS[i];
 document.getElementById('methodDetail').innerHTML=`<div class="eyebrow">Método ${i+1} · mejor para: ${m.mejor}</div><h3 class="editable">${m.nom}</h3><p class="editable" style="font-style:italic;color:var(--marron2)">${m.idea}</p><ol style="padding-left:18px;margin:8px 0 0">${m.pasos.map(p=>`<li class="editable" style="margin-bottom:6px">${p}</li>`).join('')}</ol>`;}
methodTab(0);
// plan Checklist
let TASKS=[];
document.getElementById('phases').innerHTML=PLAN.map((p,pi)=>`
 <div class="phase">
   <div class="h" onclick="this.parentNode.querySelector('.tasks').classList.toggle('hide');this.parentNode.querySelector('.tasks').style.display=this.parentNode.querySelector('.tasks').style.display=='none'?'block':'none'">
     <span class="num">${p.fase}</span><div><h3 class="editable">${p.t}</h3><div class="mini editable">${p.dias} · ${p.foco}</div></div><span class="meta">${p.tasks.length} tareas</span>
   </div>
   <div class="tasks">${p.tasks.map((t,ti)=>{const id='t'+pi+'-'+ti;TASKS.push(id);return `<label class="task" id="lab-${id}"><input type="checkbox" onchange="toggleTask('${id}',this)"><span class="t editable">${t[0]}<span class="ch">${t[1]}</span></span></label>`;}).join('')}</div>
 </div>`).join('');
function toggleTask(id,el){document.getElementById('lab-'+id).classList.toggle('done',el.checked);updProg();}
function updProg(){const done=TASKS.filter(id=>document.querySelector('#lab-'+id+' input').checked).length;const pct=Math.round(done/TASKS.length*100);document.getElementById('progBar').style.width=pct+'%';document.getElementById('progTxt').textContent=pct+'%';}

/* content tabs */
function contTab(v,el){document.querySelectorAll('#contChips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');document.getElementById('cont-si').style.display=v=='si'?'block':'none';document.getElementById('cont-no').style.display=v=='no'?'block':'none';}

/* switch ahora/propuesta */
function sw(id,v){document.querySelectorAll(`[data-switch="${id}"] button`).forEach(b=>b.classList.toggle('on',b.dataset.v==v));
 document.querySelector(`[data-pane="${id}-ahora"]`).classList.toggle('show',v=='ahora');
 document.querySelector(`[data-pane="${id}-prop"]`).classList.toggle('show',v=='prop');}

/* ============================ NAV ============================ */
const navEl=document.getElementById('nav');
NAV.forEach(n=>{ if(n.g){const d=document.createElement('div');d.className='grp';d.textContent=n.g;navEl.appendChild(d);}
 else{const b=document.createElement('button');b.dataset.id=n.id;b.innerHTML=`<span class="dot"></span>${n.label}`;b.onclick=()=>go(n.id);navEl.appendChild(b);} });
function go(id){Object.values(S).forEach(s=>s.classList.remove('show'));S[id].classList.add('show');
 document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.id==id));
 const lbl=(NAV.find(n=>n.id==id)||{}).label||'';document.getElementById('crumb').textContent=lbl;
 window.scrollTo({top:0,behavior:'smooth'});closeNav();}
function openNav(){document.getElementById('side').classList.add('open');document.getElementById('scrim').classList.add('on');}
function closeNav(){document.getElementById('side').classList.remove('open');document.getElementById('scrim').classList.remove('on');}
go('inicio');

/* ============================ EDIT MODE + HISTORY ============================ */
let editing=false, editHistory=[], _idc=0, _orig={};
function initEditable(){document.querySelectorAll('.editable').forEach(e=>{ if(!e.dataset.eid){e.dataset.eid='e'+(++_idc);
   e.addEventListener('focus',()=>{_orig[e.dataset.eid]=e.innerText;});
   e.addEventListener('blur',()=>{const before=_orig[e.dataset.eid]??'';const after=e.innerText;
     if(editing && before!==after){const secId=e.closest('[data-section]')?.dataset.section||'—';
       editHistory.unshift({sec:secId,before,after,t:new Date().toLocaleString('es-PE')});renderHist();}});
 }});}
function toggleEdit(){editing=!editing;document.body.classList.toggle('editing',editing);
 document.getElementById('editBtn').classList.toggle('on',editing);
 document.getElementById('editBtn').innerHTML=editing?'✓ Listo':'✎ Editar textos';
 document.querySelectorAll('.editable').forEach(e=>e.contentEditable=editing);}
function renderHist(){document.getElementById('histCount').textContent=editHistory.length;
 const el=document.getElementById('histTable');if(!editHistory.length){el.innerHTML='<p class="mini">Aún no hay ediciones.</p>';return;}
 el.innerHTML='<div style="overflow-x:auto"><table><thead><tr><th>Hora</th><th>Sección</th><th>Antes</th><th>Después</th></tr></thead><tbody>'+
  editHistory.map(h=>`<tr><td class="mini" style="white-space:nowrap">${h.t}</td><td><span class="ch" style="font-size:9px">${h.sec}</span></td><td class="mini" style="color:var(--ahora)">${escapeHtml(h.before).slice(0,90)}</td><td class="mini" style="color:var(--prop)">${escapeHtml(h.after).slice(0,90)}</td></tr>`).join('')+'</tbody></table></div>';}
function clearHist(){editHistory=[];renderHist();}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
initEditable();renderHist();
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeNav();});
</script>
</body>
</html>
